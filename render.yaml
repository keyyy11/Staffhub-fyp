# Render Blueprint — Staff Hub API
# Dashboard: New → Blueprint → connect this repo, or New → Web Service manually.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: staffhub-api
    runtime: node
    rootDir: staffhub-api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: WORKPLACE_LAT
        value: "1.5434665"
      - key: WORKPLACE_LNG
        value: "103.6123308"
      - key: WORKPLACE_RADIUS_METERS
        value: "60"
      - key: EXPECTED_CLOCK_IN_HOUR
        value: "9"
      - key: EXPECTED_CLOCK_IN_MINUTE
        value: "0"
